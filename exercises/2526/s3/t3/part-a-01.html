<script>
/*
   Shared PDF/print snapshot renderer for Assessments.
   Browser: window.AssessPDF
   Node: require("./tool/pdf.js")
*/
(function(root, factory) {
  const api = factory();
  if (typeof module === "object" && module.exports) module.exports = api;
  root.AssessPDF = api;
})(typeof globalThis !== "undefined" ? globalThis : this, createAssessPDF);

function createAssessPDF() {
  const SHOW_QUESTION_CODE = true;

  function escapeHtml(value) {
    return String(value == null ? "" : value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function stripScripts(html) {
    return String(html || "").replace(/<script[\s\S]*?<\/script>/gi, "");
  }

  function hashString(input) {
    let h = 0x811c9dc5;
    const s = String(input || "");
    for (let i = 0; i < s.length; i += 1) {
      h ^= s.charCodeAt(i);
      h = Math.imul(h, 0x01000193) >>> 0;
    }
    return h.toString(16).padStart(8, "0");
  }

  function makeSeededRng(seedValue) {
    let s = 0;
    const seed = String(seedValue);
    for (let i = 0; i < seed.length; i += 1) {
      s = ((s << 5) - s + seed.charCodeAt(i)) | 0;
    }
    if (s === 0) s = 0x12345678;
    return function seededRandom() {
      s ^= s << 13; s ^= s >>> 17; s ^= s << 5;
      return ((s >>> 0) / 0x100000000);
    };
  }

  function withOptionalSeed(seedValue, fn) {
    if (seedValue === null || seedValue === undefined || seedValue === "") return fn();
    const originalRandom = Math.random;
    Math.random = makeSeededRng(seedValue);
    try { return fn(); }
    finally { Math.random = originalRandom; }
  }

  function createSnapshotSeed(seedValue) {
    if (seedValue !== null && seedValue !== undefined && seedValue !== "") return String(seedValue);
    if (typeof crypto !== "undefined" && crypto.getRandomValues) {
      const parts = new Uint32Array(4);
      crypto.getRandomValues(parts);
      return Array.from(parts).join("-");
    }
    const perf = typeof performance !== "undefined" && performance.now ? performance.now() : 0;
    return Date.now() + "-" + perf + "-" + Math.random();
  }

  function buildInstance(spec, index, generatorApi) {
    const typeDef = spec.typeDef || spec;
    const res = generatorApi.generateQuestion(typeDef, spec.params || {});
    return normalizeQuestionInstance({
      qid: spec.qid || ("q" + String(index + 1).padStart(3, "0")),
      typeKey: spec.typeKey || typeDef.key,
      type: typeDef.type || res.type || "text",
      checkType: typeDef.checkType || res.checkType,
      validator: typeDef.validator || res.validator || typeDef.checkType || res.checkType,
      questionHTML: res.questionHTML,
      correctAnswer: res.correctAnswer,
      paramsUsed: res.paramsUsed || {},
      pdfText: res.pdfText || "",
      displayAnswer: res.displayAnswer || res.correctAnswer,
      solutionHTML: res.solutionHTML || "",
      options: typeDef.options || res.options,
      interaction: res.interaction,
      imageSvg: res.imageSvg,
      answerSpec: res.answerSpec || typeDef.answerSpec,
      code: typeDef.code || res.code || null,
      figure: res.figure || (res.imageSvg ? { imageSvg: res.imageSvg } : null),
    }, index);
  }

  function normalizeQuestionInstance(q, index) {
    return {
      qid: q.qid || ("q" + String(index + 1).padStart(3, "0")),
      index: index + 1,
      typeKey: q.typeKey,
      type: q.type || "text",
      checkType: q.checkType || q.validator,
      validator: q.validator || q.checkType,
      questionHTML: q.questionHTML || q.pdfText || "",
      correctAnswer: q.correctAnswer == null ? "" : String(q.correctAnswer),
      paramsUsed: q.paramsUsed || {},
      pdfText: q.pdfText || q.questionHTML || "",
      displayAnswer: q.displayAnswer == null ? (q.correctAnswer == null ? "" : String(q.correctAnswer)) : String(q.displayAnswer),
      solutionHTML: q.solutionHTML || "",
      options: q.options || null,
      interaction: q.interaction || null,
      imageSvg: q.imageSvg || "",
      answerSpec: q.answerSpec || null,
      code: q.code || null,
      figure: q.figure || (q.imageSvg ? { imageSvg: q.imageSvg } : null),

  function normalizeSource(source) {
    if (Array.isArray(source)) return { questionSpecs: source };
    return source || {};

  function generateSnapshot(source, seed, options) {
    const src = normalizeSource(source);
    if (Array.isArray(src.questions)) {
      return generateSnapshotFromQuestions(src.questions, Object.assign({}, src, options || {}, { seed }));
    }
    return generateSnapshotFromSpecs(src.questionSpecs || src.specs || [], seed, Object.assign({}, src, options || {}));
  }

  function generateSnapshotFromSpecs(questionSpecs, seed, options) {
    const generatorApi = (options && options.generatorApi)
      || (typeof AssessGenerators !== "undefined" ? AssessGenerators : null)
      || (typeof window !== "undefined" ? window.AssessGenerators : null);
    if (!generatorApi || typeof generatorApi.generateQuestion !== "function") {
      throw new Error("AssessGenerators 未載入，無法產生 PDF snapshot");
    }
    const finalSeed = createSnapshotSeed(seed);
    const instances = withOptionalSeed(finalSeed, () => questionSpecs.map((spec, index) => buildInstance(spec, index, generatorApi)));
    return buildSnapshot(instances, finalSeed, options || {});
  }

  function generateSnapshotFromQuestions(questions, options) {
    const seed = options && options.seed ? String(options.seed) : "existing-runtime";
    const instances = questions.map((q, index) => normalizeQuestionInstance(q, index));
    return buildSnapshot(instances, seed, options || {});
  }

  function buildSnapshot(instances, seed, options) {
    const minimal = instances.map((q) => ({
      qid: q.qid,
      typeKey: q.typeKey,
      paramsUsed: q.paramsUsed,
      answerSpec: q.answerSpec,
      displayAnswer: q.displayAnswer,
    }));
    const snapshotId = "pdf-" + hashString(JSON.stringify({ seed, minimal }));
    return {
      snapshotId,
      seed,
      title: (options && options.title) || "初中數學短答練習",
      presetKey: (options && options.presetKey) || "custom",
      generatedAt: (options && options.generatedAt) || new Date().toISOString(),
      questions: instances,
    };
  }

  function questionHtml(q) {
    let html = stripScripts(q.questionHTML || q.pdfText || "");
    const imageSvg = stripScripts(q.imageSvg || (q.figure && q.figure.imageSvg) || "");
    if (imageSvg && !/<svg[\s>]/i.test(html)) html += '<div class="pdf-figure">' + imageSvg + "</div>";
    return html;
  }

  function answerHtml(answer) {
    const raw = String(answer == null ? "" : answer);
    if (raw === "") return "";
    const hasMath = /\\|π|√|±|≥|≤|×|%|≈|²|³|[<>]|\^/.test(raw) && !/\$/.test(raw);
    if (!hasMath) return escapeHtml(raw);
    const tex = raw
      .replace(/π/g, "\\pi")
      .replace(/√(\d+)/g, "\\sqrt{$1}")
      .replace(/±/g, "\\pm ")
      .replace(/≥/g, "\\geq ")
      .replace(/≤/g, "\\leq ")
      .replace(/×/g, "\\times ")
      .replace(/≈/g, "\\approx ")
      .replace(/²/g, "^2")
      .replace(/³/g, "^3")
      .replace(/%/g, "\\%");
    return "\\(" + tex + "\\)";

  function renderPDF(snapshot, mode, options) {
    if (mode !== "student" && mode !== "teacher") throw new Error("Unknown PDF mode: " + mode);
    const showCode = !options || options.showCode !== false;
    const title = (snapshot && snapshot.title ? snapshot.title : "(甲部) 短答題")
      + (mode === "teacher" ? " 答案版" : "");
    const modeClass = mode === "teacher" ? "teacher" : "student";
    const rows = snapshot.questions.map((q, idx) => {
      const answer = mode === "teacher"
        ? '<div class="pdf-answer pdf-teacher-answer">' + answerHtml(q.displayAnswer || q.correctAnswer) + '</div>'
        : '<div class="pdf-answer-line"></div>';
      const code = showCode && q.code ? '<div class="pdf-code">' + escapeHtml(q.code) + '</div>' : "";
      return [
        '<article class="pdf-question-row" data-qid="' + escapeHtml(q.qid) + '" data-type-key="' + escapeHtml(q.typeKey) + '">',
        '  <div class="pdf-question-left">',
        '    <div class="pdf-question-body">' + questionHtml(q) + '</div>',
        code,
        '  </div>',
        '  <div class="pdf-answer-right">',
        '    <div class="pdf-qno">(' + (idx + 1) + ')</div>',
        answer,
        '  </div>',
        '</article>'
      ].join("\n");
    }).join("\n");

    return [
      '<section class="pdf-paper pdf-paper-' + modeClass + '" data-snapshot-id="' + escapeHtml(snapshot.snapshotId) + '" data-mode="' + mode + '">',
      '  <header class="pdf-header">',
      '    <h1>' + title + '</h1>',
      '    <div class="pdf-meta">',
      '      <span>姓名：____________________</span>',
      '      <span>班別：____________</span>',
      '      <span>日期：____________</span>',
      '    </div>',
      '    <div class="pdf-snapshot-meta">' + escapeHtml(snapshot.title) + ' · ' + escapeHtml(snapshot.presetKey) + ' · ' + escapeHtml(snapshot.snapshotId) + '</div>',
      '  </header>',
      '  <main class="pdf-questions">',
      rows,
      '  </main>',
      '</section>'
    ].join("\n");
  }

  function renderPrintDocument(snapshot, options) {
    const showCode = !options || options.showCode !== false;
    const student = renderPDF(snapshot, "student", { showCode });
    const teacher = renderPDF(snapshot, "teacher", { showCode });

    const scriptClose = "</scr" + "ipt>";
    return '<!DOCTYPE html>\n<html lang="zh-HK">\n<head>\n<meta charset="UTF-8">\n'
      + '<meta name="viewport" content="width=device-width, initial-scale=1.0">\n'
      + '<title>' + escapeHtml(snapshot.title) + ' PDF</title>\n'
      + scriptOpen + '>window.MathJax={tex:{inlineMath:[[\'\\\\(\',\'\\\\)\'],[\'$\',\'$\']],displayMath:[[\'$$\',\'$$\']]},options:{skipHtmlTags:[\'script\',\'noscript\',\'style\',\'textarea\',\'pre\']},startup:{typeset:false}};' + scriptClose + '\n'

      + '<style>' + printCss() + '</style>\n</head>\n<body data-snapshot-id="' + escapeHtml(snapshot.snapshotId) + '">\n'
      + student + '\n<div class="pdf-page-separator"></div>\n' + teacher + '\n'
      + scriptOpen + '>' + printScript() + scriptClose + '\n</body>\n</html>';
  }

  function printCss() {
    return [
      '@page{size:A4 portrait;margin:12mm;}',
      '*{box-sizing:border-box;}',
      'body{margin:0;background:#fff;color:#111;font-family:"Times New Roman","PingFang HK","Microsoft JhengHei",serif;font-size:11pt;line-height:1.35;}',
      '.pdf-paper{width:100%;}',
      '.pdf-paper-teacher{page-break-before:always;}',
      '.pdf-header{border-bottom:1.5pt solid #111;margin-bottom:8mm;padding-bottom:4mm;}',
      '.pdf-header h1{text-align:center;margin:0 0 4mm 0;font-size:16pt;letter-spacing:.08em;}',
      '.pdf-meta{display:flex;gap:10mm;justify-content:space-between;font-size:11pt;}',
      '.pdf-snapshot-meta{margin-top:2mm;color:#666;font-size:7.5pt;text-align:right;}',
      '.pdf-question-row{display:grid;grid-template-columns:minmax(0,65%) minmax(34mm,35%);gap:6mm;align-items:start;border-bottom:.5pt solid #ddd;padding:3.4mm 0;page-break-inside:avoid;break-inside:avoid;}',
      '.pdf-question-left{min-width:0;}',
      '.pdf-question-body{font-size:11pt;overflow-wrap:anywhere;}',
      '.pdf-question-body svg,.pdf-figure svg{max-width:100%;height:auto;}',
      '.pdf-code{font-family:Menlo,Consolas,monospace;font-size:7.5pt;color:#777;margin-top:1.5mm;}',
      '.pdf-answer-right{display:flex;align-items:flex-end;gap:3mm;min-height:12mm;}',
      '.pdf-qno{font-weight:bold;font-size:11pt;min-width:9mm;}',
      '.pdf-answer-line{border-bottom:1pt solid #111;flex:1;height:9mm;}',
      '.pdf-teacher-answer{border-bottom:1pt solid #111;flex:1;min-height:9mm;color:#c0392b;font-weight:700;font-size:11pt;overflow-wrap:anywhere;}',
      '.pdf-page-separator{page-break-before:always;}',
      '@media screen{body{padding:18px;max-width:900px;margin:0 auto;background:#f3f5f7;}.pdf-paper{background:#fff;padding:16mm;box-shadow:0 4px 18px rgba(0,0,0,.12);margin-bottom:24px;}.pdf-page-separator{display:none;}}',
    ].join("\n");
  }

  function printScript() {
    return [
      '(function(){',
      'function nextFrame(){return new Promise(function(resolve){requestAnimationFrame(resolve);});}',
      'function waitForMathJax(){if(window.MathJax&&MathJax.startup&&MathJax.startup.promise)return MathJax.startup.promise;return Promise.resolve();}',
      'function waitForAssets(){var imgs=Array.from(document.images||[]);return Promise.all(imgs.map(function(img){if(img.complete)return Promise.resolve();return new Promise(function(resolve,reject){img.addEventListener("load",resolve,{once:true});img.addEventListener("error",reject,{once:true});});}));}',
      'async function run(){',
      '  await waitForMathJax();',
      '  if(window.MathJax&&MathJax.typesetPromise) await MathJax.typesetPromise([document.body]);',
      '  await waitForAssets();',

      '  await nextFrame();',
      '  window.print();',

  function printSnapshot(snapshot, options) {
    const html = renderPrintDocument(snapshot, options || {});
    const target = window.open("", "_blank");
    if (!target) throw new Error("瀏覽器阻擋了列印視窗，請允許彈出視窗後再試。");
    target.document.open();
    target.document.write(html);
    target.document.close();
    return { snapshot, html, target };
  }

  return {
    SHOW_QUESTION_CODE,
    createSnapshotSeed,
    generateSnapshot,
    generateSnapshotFromSpecs,
    generateSnapshotFromQuestions,
    renderPDF,
    renderPrintDocument,
    printSnapshot,
    _private: { hashString, printScript, printCss, answerHtml },

}

function makeSeededRng(seedValue) {
  let s = 0;
  const seed = String(seedValue);
  for (let i = 0; i < seed.length; i++) {
    s = ((s << 5) - s + seed.charCodeAt(i)) | 0;
  }
  if (s === 0) s = 0x12345678;
  return function() {
    s ^= s << 13; s ^= s >>> 17; s ^= s << 5;
    return ((s >>> 0) / 0x100000000);
  };
}

function withOptionalRuntimeSeed(seedValue, fn) {
  if (seedValue === null || seedValue === undefined || seedValue === "") return fn();
  const originalRandom = Math.random;
  Math.random = makeSeededRng(seedValue);
  try { return fn(); }
  finally { Math.random = originalRandom; }
}

function createRuntimeSeed(seedValue) {
  if (seedValue !== null && seedValue !== undefined && seedValue !== "") return seedValue;
  if (window.crypto && crypto.getRandomValues) {
    const parts = new Uint32Array(4);
    crypto.getRandomValues(parts);
    return Array.from(parts).join("-");
  }
  const perf = window.performance && performance.now ? performance.now() : 0;
  return Date.now() + "-" + perf + "-" + Math.random();
}

function assembleRuntimeQuestion(spec, typeDef, res, index) {
  const q = {
    qid: spec.qid || ("q" + String(index + 1).padStart(3, "0")),
    typeKey: spec.typeKey || typeDef.key,
    type: typeDef.type,
    checkType: typeDef.checkType || res.checkType,
    validator: typeDef.validator || res.validator || typeDef.checkType || res.checkType,
    questionHTML: res.questionHTML,
    correctAnswer: res.correctAnswer,
    paramsUsed: res.paramsUsed || {},
    solutionHTML: res.solutionHTML || "",
    pdfText: res.pdfText || "",
    displayAnswer: res.displayAnswer || res.correctAnswer,
    steps: res.steps || "",
    options: typeDef.options || res.options,
    interaction: res.interaction,
    imageSvg: res.imageSvg,
    prefix: typeDef.prefix || res.prefix,
    suffix: typeDef.suffix || res.suffix,
    primeFactors: res.primeFactors,
    answers: res.answers,
    q8subtype: res.q8subtype,
    answerSpec: res.answerSpec || typeDef.answerSpec,
    code: typeDef.code || null
  };
  return q;
}

function buildRuntimeQuestion(spec, index) {
  const typeDef = spec.typeDef || spec;
  const generatorApi = window.AssessGenerators || (typeof AssessGenerators !== "undefined" ? AssessGenerators : null);
  if (!generatorApi) throw new Error("AssessGenerators 未載入，無法 runtime 生成題目");
  const res = generatorApi.generateQuestion(typeDef, spec.params || {});
  return assembleRuntimeQuestion(spec, typeDef, res, index);
}

function initGame(mode) {
  if (mode === "all") {
    currentAttemptType = "initial";
    qList = QUESTIONS.slice();
  } else if (mode === "wrong") {
    if (origWrongIds.length === 0) { showToast("沒有錯題可重做"); return; }
    currentAttemptType = "wrong_retry";
    // 重新生成同題型：呢度我哋假設 QUESTIONS 已經是當前嘅題目池。
    // 為咗真正「重做同題型」但數值唔同，需要重新 inject 隨機參數。
    // 由於當前生成係 tool 一次性做嘅，我哋就用當前題目池（每題 type 唔同）。
    // 若果想做真動態重生，需要 QUESTIONS 包含 generator；當前版本只重用現有題目。
    qList = QUESTIONS.filter(q => origWrongIds.indexOf(q.qid) !== -1);
  }
  currIdx = 0;
  currInput = "";
  currSelectedChoice = null;
  currSelectedPoint = null;
  origWrongIds = [];
  sessionLog = [];
  sessionAnswers = [];
  answered = false;
  isSingleRetry = false;
  backup = null;
  document.getElementById("quiz-view").style.display = "flex";
  document.getElementById("result-view").style.display = "none";
  showQ();
}

    }
    if (currInput.trim() === "") { showToast("請輸入 " + (q.interaction ? q.interaction.askAxis : "") + " 坐標"); return; }
    userAns = currInput.trim();
    isTextCorrect = checkAnswer(q, currInput);
    isClickCorrect = (currSelectedPoint.x === q.interaction.targetX &&
                      currSelectedPoint.y === q.interaction.targetY);
  } else {
    if (currInput.trim() === "") { showToast("請輸入答案"); return; }
    userAns = currInput;
    isTextCorrect = checkAnswer(q, currInput);
  }
  answered = true;
  let isCorrect;
  if (q.type === "coordinate") {
    isCorrect = isTextCorrect && isClickCorrect === true;
  } else {
    isCorrect = isTextCorrect;
  }
  const fb = document.getElementById("q-feedback");
  fb.style.display = "block";
  if (isCorrect) {
    fb.className = "feedback correct";
    fb.innerHTML = "✓ 正確！";
  } else {
    fb.className = "feedback incorrect";
    let ans = q.displayAnswer || q.correctAnswer;
    fb.innerHTML = "✗ 答錯。正確答案： " + ans;
    origWrongIds.push(q.qid);
  }
  document.getElementById("btn-check").style.display = "none";
  document.getElementById("btn-next").style.display = "block";
  document.getElementById("btn-teach").style.display = "inline-block";
  collapseAnswerControlsAfterCheck();
  const solBox = document.getElementById("solution-box");
  solBox.innerHTML = "<h4>教學步驟</h4>" + (q.solutionHTML || q.steps || "");
  if (window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise([solBox]).catch(() => {});
  }
  sessionLog.push({ qid: q.qid, user: userAns, correct: isCorrect });
  sessionAnswers.push(userAns);
  const correctCount = sessionLog.filter(s => s.correct).length;
  document.getElementById("score-mini").textContent = "得分: " + correctCount;
}

function toggleTeach() {
  const solBox = document.getElementById("solution-box");
  solBox.style.display = solBox.style.display === "block" ? "none" : "block";
}

function nextQ() {
  currIdx++;
  showQ();
}

/* === 完成一輪 === */
function finishGame() {
  // 單題重做：還原狀態，唔記錄新嘗試
  if (isSingleRetry) {
    restoreFromBackup();
    showResult();
    return;
  }
  const total = qList.length;
  const score = sessionLog.filter(s => s.correct).length;
  const remainingWrongCount = total - score;
  const completedAll = (remainingWrongCount === 0);
  const attemptNumber = allAttempts.length + 1;
  const d = new Date();
  const dateStr = (d.getMonth() + 1) + "/" + d.getDate();
  const timeStr = String(d.getHours()).padStart(2, "0") + ":" + String(d.getMinutes()).padStart(2, "0");
  const attempt = {
    n: attemptNumber,
    attemptNumber: attemptNumber,
    attemptType: currentAttemptType,
    score: score,
    total: total,
    remainingWrongCount: remainingWrongCount,
    completedAll: completedAll,
    date: dateStr,
    time: timeStr,
    details: qList.map((q, i) => ({
      qid: q.qid,
      questionHTML: q.questionHTML,
      displayAnswer: q.displayAnswer,
      myAnswer: sessionAnswers[i] || "",
      correct: sessionLog[i] ? sessionLog[i].correct : false,
      steps: q.solutionHTML || q.steps || "",
      typeKey: q.typeKey,
      type: q.type
    }))
  };
  allAttempts.push(attempt);
  saveAttempts();
  lastResult = attempt;
  showResult();
}

/* === 單題重做備份 / 還原 === */
function backupState() {
  backup = {
    qList: qList.slice(),
    currIdx: currIdx,
    origWrongIds: origWrongIds.slice(),
    currentAttemptType: currentAttemptType,
    allAttemptsCount: allAttempts.length
  };
}
function restoreFromBackup() {
  if (!backup) { isSingleRetry = false; return; }
  qList = backup.qList;
  currIdx = backup.currIdx;
  origWrongIds = backup.origWrongIds;
  currentAttemptType = backup.currentAttemptType;
  isSingleRetry = false;
  backup = null;
}

/* === 結果頁 === */
function showResult() {
  document.getElementById("quiz-view").style.display = "none";
  document.getElementById("result-view").style.display = "flex";
  if (lastResult) {
    document.getElementById("final-score").textContent = lastResult.score + " / " + lastResult.total;
    document.getElementById("btn-retry-wrong").style.display = (lastResult.remainingWrongCount === 0) ? "none" : "block";
  } else {
    document.getElementById("final-score").textContent = "—";
    document.getElementById("btn-retry-wrong").style.display = "none";
  }
  updateSubmitGate();
  renderHistory();
}

function canSubmitToTeacher() {
  return !!(lastResult && lastResult.completedAll === true && GAS_URL);
}

function updateSubmitGate() {
  const btn = document.getElementById("btn-export");
  const hint = document.getElementById("submit-hint");
  if (!btn || !hint) return;
  const ok = canSubmitToTeacher();
  btn.disabled = !ok;
  if (!GAS_URL) {
    hint.textContent = "未配置提交目的地，暫時不能提交答案至老師。";
  } else {
    hint.textContent = ok
      ? "已完成所有錯題，可提交學習記錄。"
      : "完成所有錯題重做後方可提交。";
  }
}

function renderHistory() {
  const tbody = document.getElementById("history-body");
  tbody.innerHTML = "";
  // 按 attemptNumber 由小到大穩定顯示，避免舊記錄因排序反轉被誤判消失。
  for (let i = 0; i < allAttempts.length; i++) {
    const h = allAttempts[i];
    const typeLabel = h.attemptType === "initial" ? "初次" : "重做";
    const tr = document.createElement("tr");
    const someWrong = h.details.some(x => !x.correct);
    const someRight = h.details.some(x => x.correct);
    const actionBtns = [
      someWrong ? `<button class="btn-view-wrong" onclick="viewDetails(${i},'wrong')">錯題</button>` : `<span class="btn-disabled">無</span>`,
      someRight ? `<button class="btn-view-correct" onclick="viewDetails(${i},'correct')">正題</button>` : `<span class="btn-disabled">無</span>`
    ].join(" ");
    tr.innerHTML = '<td>' + h.n + '</td><td>' + typeLabel + '</td><td style="font-size:0.85em;">' + h.date + ' ' + h.time + '</td><td><b>' + h.score + '/' + h.total + '</b></td><td>' + h.remainingWrongCount + '</td><td>' + actionBtns + '</td>';
    tbody.appendChild(tr);
  }
}

function openModal(title, bodyHTML) {
  document.getElementById("modal-title").textContent = title;
  document.getElementById("modal-body-content").innerHTML = bodyHTML;
  document.getElementById("detail-modal").style.display = "flex";
  if (window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise([document.getElementById("modal-body-content")]).catch(() => {});
  }
}
function closeModal() { document.getElementById("detail-modal").style.display = "none"; }

function viewDetails(logIdx, mode) {
  const details = allAttempts[logIdx].details;
  const filtered = details.filter(q => mode === "wrong" ? !q.correct : q.correct);
  let h = "";
  filtered.forEach(q => {
    h += '<div class="review-item ' + (q.correct ? "correct-record" : "wrong-record") + '">';
    h += '<div class="review-q">' + q.questionHTML + '</div>';
    h += '<div>你的答案: <span class="review-my-ans">' + (q.myAnswer || "(無)") + '</span></div>';
    h += '<div class="review-cor-ans">正確答案: \\( ' + (q.displayAnswer || q.correctAnswer) + ' \\)</div>';
    h += '<div style="background:#fffcf5;border:1px solid #fce8b2;padding:10px;margin-top:8px;border-radius:6px;font-size:0.9em;">' + (q.steps || "") + '</div>';
    h += '<button onclick="retrySingle(\'' + q.qid + '\')" style="margin-top:8px;background:var(--accent);color:white;border:none;padding:6px 12px;border-radius:6px;font-size:0.9em;font-weight:600;cursor:pointer;width:100%;">🔄 重做此題</button>';
    h += '</div>';
  });
  openModal(mode === "wrong" ? "錯題回顧" : "答對題目回顧", h || "<div>沒有題目</div>");
}

/* === 單題重做 === */
function retrySingle(qid) {
  closeModal();
  backupState();
  isSingleRetry = true;
  // 由完整題庫搵呢題（唔靠 qList — 咁 history 舊 entry 嘅 qid 都搵到），
  // 同時 set qList = [singleQ] 做一個 one-question session。
  // finishGame 嘅 isSingleRetry branch 會用 backup 還原返之前嘅 qList / origWrongIds。
  const q = QUESTIONS.find(q => q.qid === qid);
  if (!q) { showToast("搵唔到題目"); return; }
  qList = [q];
  currIdx = 0;
  // 重置呢題嘅 myAnswer 顯示
  // 唔清空 sessionLog / origWrongIds（會喺 finishGame 後還原）
  currInput = "";
  currSelectedChoice = null;
  currSelectedPoint = null;
  answered = false;
  document.getElementById("quiz-view").style.display = "flex";
  document.getElementById("result-view").style.display = "none";
  showQ();
}

/* === 匯出 / 列印 === */
function exportStudentAnswers() {
  // 匯出當前輪嘅逐題結果（純本地）
  const details = lastResult ? lastResult.details : [];
  let text = "題目\t題目內容\t學生答案\t正確答案\t對錯\n";
  details.forEach((s, i) => {
    const qText = s.questionHTML ? s.questionHTML.replace(/<[^>]+>/g, "") : "";
    text += (i + 1) + "\t" + qText + "\t" + s.myAnswer + "\t" + (s.displayAnswer || "") + "\t" + (s.correct ? "✓" : "✗") + "\n";
  });
  const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "student_answers_" + Date.now() + ".tsv";
  a.click();
  URL.revokeObjectURL(url);
}

function printPDF() {
  try {
    const seed = AssessPDF.createSnapshotSeed();
    const source = (Array.isArray(QUESTION_SPECS) && QUESTION_SPECS.length > 0)
      ? { title: TITLE, presetKey: PRESET_KEY, questionSpecs: QUESTION_SPECS }
      : { title: TITLE, presetKey: PRESET_KEY, questions: QUESTIONS };
    const snapshot = AssessPDF.generateSnapshot(source, seed, {
      title: TITLE,
      presetKey: PRESET_KEY,
      generatedAt: new Date().toISOString(),
    });
    AssessPDF.printSnapshot(snapshot, { showCode: true });
    showToast("✓ 已開啟 PDF 題目＋答案雙版");
  } catch (e) {
    showToast("⚠️ PDF 匯出失敗：" + (e.message || e));
  }
}

/* === Google Sheets 提交 === */
function handleExport() {
  if (allAttempts.length === 0) { showToast("⚠️ 暫無記錄可匯出"); return; }
  if (!GAS_URL) { showToast("⚠️ 未配置提交目的地"); updateSubmitGate(); return; }
  if (!canSubmitToTeacher()) { showToast("⚠️ 完成所有錯題重做後方可提交"); updateSubmitGate(); return; }
  // 用戶輸入學生編號
  const sid = (prompt("請輸入你的學生證編號（" + STUDENT_ID_RULE_TEXT + "）") || "").trim().toUpperCase();
  if (!STUDENT_ID_PATTERN.test(sid)) {
    showToast("⚠️ 學生證編號格式錯誤：" + STUDENT_ID_RULE_TEXT);
    return;
  }
  submitToSheets(sid);
}

function submitToSheets(studentId) {
  if (!GAS_URL || GAS_URL === "") {
    showToast("⚠️ 此練習未設定 Google Sheets 提交網址");
    return;
  }
  const rows = allAttempts.map(r => ({
    studentId: studentId,
    grade: GRADE || "unknown",
    toolId: TOOL_ID,
    attemptNumber: r.attemptNumber,
    attemptType: r.attemptType,
    score: r.score,
    total: r.total,
    remainingWrongCount: r.remainingWrongCount,
    completedAll: r.completedAll,
    date: r.date,
    time: r.time
  }));
  const payload = JSON.stringify({ rows: rows });
  const btn = document.getElementById("btn-export");
  const orig = btn.innerText;
  btn.innerText = "⏳ 正在送出...";
  btn.disabled = true;
  // no-cors：無法讀取伺服器回應，只可表示「已嘗試送出」
  fetch(GAS_URL, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "text/plain" },
    body: payload
  })
  .then(() => { btn.innerText = orig; btn.disabled = false; showToast("📤 已嘗試送出，請到 Google Sheets 確認"); })
  .catch(() => { btn.innerText = orig; btn.disabled = false; showToast("📤 已嘗試送出，請到 Google Sheets 確認"); });
}

/* === 鍵盤 === */
document.addEventListener("keydown", function(e) {
  if (document.getElementById("quiz-view").style.display === "none") return;
  const k = e.key;
  if (/^[0-9a-zA-Z().%]$/.test(k)) { kp(k); e.preventDefault(); }
  else if (k === "+") { kp("+"); e.preventDefault(); }
  else if (k === "-") { kp("-"); e.preventDefault(); }
  else if (k === "*" || k === "x" || k === "X") { kp("×"); e.preventDefault(); }
  else if (k === "/") { kp("÷"); e.preventDefault(); }
  else if (k === "^") { kp("^"); e.preventDefault(); }
  else if (k === ">" || k === "<" || k === "=") { kp(k); e.preventDefault(); }
  else if (k === "Backspace") { del(); e.preventDefault(); }
  else if (k === "Enter") {
    if (document.getElementById("btn-check").style.display !== "none") { checkAns(); }
    else if (document.getElementById("btn-next").style.display !== "none") { nextQ(); }
    e.preventDefault();
  }
});

/* === 啟動 === */
loadAttempts();
if (allAttempts.length > 0) {
  // 直接顯示上次結果（用戶可以再玩或重做錯題）
  lastResult = allAttempts[allAttempts.length - 1];
  // 還原 origWrongIds 令「重做錯題」reload 後 work。
  // qList 由 retrySingle 自己 handle（佢會 lookup QUESTIONS + set qList = [singleQ]），
  // 所以 saved-state 唔需要 touch qList。
  if (Array.isArray(lastResult.details) && lastResult.details.length > 0) {
    origWrongIds = lastResult.details.filter(d => !d.correct).map(d => d.qid);
  }
  showResult();
} else {
  initGame("all");
}
</script>
