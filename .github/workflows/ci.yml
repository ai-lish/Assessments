name: Assessments CI

on:
  pull_request:
  push:
    branches:
      - main
      - debug/teacher-tool-render-filter

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Teacher tool filter regression
        run: node test/test_tool_logic.cjs

      - name: Python filter subprocess regression
        run: python3 test/validate_filter_subprocess.py

      - name: Teacher tool validator
        run: python3 test/validate_tool.py

      - name: UX2 export section visibility regression
        run: node test/ux2_export_visible.cjs

      - name: Question bank validator
        run: python3 test/validate_bank.py

      - name: Schema contract validator
        run: python3 test/validate_schema.py

      - name: Generator equivalence validator
        run: node test/test_generators_equivalence.cjs

      - name: Solid mensuration random parameter regression
        run: node test/solid_mensuration_random.cjs

      - name: Sector measure random parameter regression
        run: node test/sector_measure_random.cjs

      - name: Rational pi coefficient regression
        run: node test/pi_coeff_rational.cjs

      - name: Factor difference square random parameter regression
        run: node test/factor_diff_sq_random.cjs

      - name: Factor cross random parameter regression
        run: node test/factor_cross_random.cjs

      - name: Solve inequality random parameter regression
        run: node test/solve_ineq_random.cjs

      - name: Validator fixture test
        run: node test/test_validators.cjs

      - name: Math correctness contract regression
        run: node test/mathfix_contract.cjs

      - name: Dynamic code scan
        run: node test/no_dynamic_code.cjs

      - name: Preset validator
        run: python3 test/validate_preset.py

      - name: Teacher tool e2e
        run: python3 test/e2e_tool.py

      - name: Runtime random export regression
        run: node test/runtime_random_export.cjs

      - name: Submit gate and payload regression
        run: node test/submit_gate.cjs

      - name: GAS dual-contract documentation check
        run: node test/gas_endpoint_contract.cjs

      - name: UX1 keyboard and collapse regression
        run: node test/ux1_layout.cjs

      - name: Input answerability regression
        run: node test/input_answerability.cjs

      - name: Input LaTeX preview regression
        run: node test/input_preview_contract.cjs

      - name: Student question code top bar regression
        run: node test/codepos_top_info.cjs

      - name: PDF snapshot fixture regression
        run: node test/pdf_snapshot.cjs

      - name: S1 Term 3 baseline
        run: node test/s1_term3_baseline.cjs

      - name: S1 Term 2 baseline
        run: node test/s1_term2_baseline.cjs

      - name: S1 Term 2 export e2e
        run: node test/e2e_s1_term2_export.cjs

      - name: S2 Term 3 baseline
        run: node test/s2_term3_baseline.cjs

      - name: S3 Term 3 baseline
        run: node test/s3_term3_baseline.cjs

      - name: S3 Term 3 export e2e
        run: node test/e2e_s3_term3_export.cjs

      - name: SVG supplement check (PR #21 follow-up)
        run: node test/final_svg_check.cjs

      - name: Exercises archive runtime-random check (PR-EXERCISES)
        run: |
          # 1. Exercise the generator without creating extra part-a-02/03 files in the archive.
          rm -rf /tmp/assess-exercises-ci
          node scripts/gen_exercise_html.cjs --out-root=/tmp/assess-exercises-ci \
            s1_term2_part_a s1_term3_part_a s2_term3_part_a s3_term3_part_a
          # 2. Verify the committed archive files runtime-randomize across two fresh loads.
          node test/exercise_runtime_random_check.cjs

      - name: Exercise generator overwrite regression
        run: node test/gen_exercise_overwrite.cjs

      - name: Exercises archive PDF export check
        run: node test/exercise_pdf_export_check.cjs

      - name: HKDSE A1 tests
        run: npm --prefix hkdse run test:a1

      - name: HKDSE A2 tests
        run: npm --prefix hkdse run test:a2

      - name: HKDSE path guard
        env:
          BASE_REF: ${{ github.base_ref || 'main' }}
        run: |
          git fetch origin "$BASE_REF"
          node scripts/check-hkdse-path-guard.mjs --base "origin/$BASE_REF" --head HEAD
