<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>中三甲部練習 — Assessments</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --surface: #ffffff;
      --ink: #172033;
      --muted: #5d687b;
      --line: #ccd5e4;
      --primary: #2457a7;
      --primary-dark: #173b74;
      --primary-soft: #e1ecff;
      --shadow: 0 8px 24px rgb(31 52 86 / 10%);
      font-family:
        -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans HK",
        "PingFang HK", "Microsoft JhengHei", sans-serif;
    }
    * { box-sizing: border-box; }
    html { background: var(--bg); color: var(--ink); }
    body { margin: 0; min-width: 0; overflow-wrap: anywhere; line-height: 1.55; }
    a { color: var(--primary); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .page { max-width: 760px; margin: 0 auto; padding: 36px 20px 60px; }
    .breadcrumb { color: var(--muted); font-size: 0.9rem; margin-bottom: 12px; }
    .breadcrumb a { color: var(--primary-dark); }
    h1 { font-size: 1.7rem; margin: 0 0 6px; }
    p.lead { color: var(--muted); margin: 0 0 22px; }
    .card-grid { display: grid; gap: 16px; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); }
    article.card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 20px;
    }
    article.card .badge {
      display: inline-block;
      background: var(--primary-soft);
      color: var(--primary-dark);
      border-radius: 999px;
      padding: 2px 10px;
      font-size: 0.78rem;
      font-weight: 600;
    }
    article.card h2 { font-size: 1.15rem; margin: 6px 0 4px; }
    article.card p { color: var(--muted); font-size: 0.93rem; margin: 0 0 12px; }
    .button-link {
      border: 1px solid var(--primary);
      border-radius: 0.65rem;
      background: var(--primary);
      color: #fff;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.6rem 1.05rem;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 600;
    }
    .button-link:hover { background: var(--primary-dark); text-decoration: none; }
    footer { border-top: 1px solid var(--line); background: #eef2fa; color: var(--muted); font-size: 0.85rem; padding: 16px 20px; text-align: center; margin-top: 30px; }
  </style>
</head>
<body>
  <div class="page">
    <div class="breadcrumb"><a href="../">← 返回首頁</a></div>
    <h1>中三甲部練習</h1>
    <p class="lead">第三學期短答題，由題目庫隨機生成，即開即做。</p>

    <div class="card-grid">
      <article class="card">
        <span class="badge">T3</span>
        <h2>中三第三學期甲部</h2>
        <p>14 題。涵蓋多項式、十字相乘、平方差、科學記數、不等式、立體體積及扇形面積。</p>
        <a class="button-link" href="part-a.html">開始練習（14 題）→</a>
      </article>
    </div>
  </div>
  <footer>由 ai-lish 維護 · 公開 GitHub Pages</footer>
</body>
</html>
