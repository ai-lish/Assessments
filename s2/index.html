<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>中二甲部練習 — Assessments</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --surface: #ffffff;
      --ink: #172033;
      --muted: #5d687b;
      --line: #ccd5e4;
      --primary: #2457a7;
      --primary-dark: #173b74;
      --primary-soft: #e1ecff;
      --accent: #2c8a4a;
      --accent-soft: #e0f4e7;
      --shadow: 0 8px 24px rgb(31 52 86 / 10%);
      font-family:
        -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans HK",
        "PingFang HK", "Microsoft JhengHei", sans-serif;
    }
    * { box-sizing: border-box; }
    html { background: var(--bg); color: var(--ink); }
    body { margin: 0; min-width: 0; overflow-wrap: anywhere; line-height: 1.55; }
    a { color: var(--primary); text-decoration: none; }
    .page { max-width: 760px; margin: 0 auto; padding: 36px 20px 60px; }
    .breadcrumb { color: var(--muted); font-size: 0.9rem; margin-bottom: 12px; }
    .breadcrumb a { color: var(--primary-dark); }
    h1 { font-size: 1.7rem; margin: 0 0 6px; }
    p.lead { color: var(--muted); margin: 0 0 22px; }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-left: 4px solid var(--accent);
      border-radius: 12px;
      padding: 22px;
      box-shadow: var(--shadow);
    }
    .panel .badge {
      display: inline-block;
      background: var(--accent-soft);
      color: var(--accent);
      border-radius: 999px;
      padding: 2px 10px;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .panel h2 { font-size: 1.15rem; margin: 8px 0 4px; }
    .panel p { color: var(--muted); margin: 6px 0; }
    .button-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      margin-top: 14px;
      padding: 10px 16px;
      border-radius: 8px;
      background: var(--primary);
      color: #fff;
      font-weight: 700;
    }
    .button-link:hover { background: var(--primary-dark); text-decoration: none; }
    footer { border-top: 1px solid var(--line); background: #eef2fa; color: var(--muted); font-size: 0.85rem; padding: 16px 20px; text-align: center; margin-top: 30px; }
  </style>
</head>
<body>
  <div class="page">
    <div class="breadcrumb"><a href="../">← 返回首頁</a></div>
    <h1>中二甲部練習</h1>
    <p class="lead">中二第三學期甲部已開放，可直接開啟練習。</p>

    <div class="panel">
      <span class="badge">已開放</span>
      <h2>中二第三學期甲部</h2>
      <p>16 題 · 代數化簡、方程、因式分解、有效數字、比例、折扣、盈虧、體積。</p>
      <p>每次開啟會重新生成題目數值；同一次練習內重做錯題或單題重做會保留同一批題目。</p>
      <a class="button-link" href="../exercises/2526/s2/t3/part-a-01.html">開始練習（16 題）→</a>
    </div>
  </div>
  <footer>由 ai-lish 維護 · 公開 GitHub Pages</footer>
</body>
</html>
