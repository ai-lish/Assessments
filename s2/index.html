<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>中二甲部練習 — Assessments</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --surface: #ffffff;
      --ink: #172033;
      --muted: #5d687b;
      --line: #ccd5e4;
      --primary: #2457a7;
      --primary-dark: #173b74;
      --primary-soft: #e1ecff;
      --warning: #8a5500;
      --warning-bg: #fff4d6;
      --shadow: 0 8px 24px rgb(31 52 86 / 10%);
      font-family:
        -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans HK",
        "PingFang HK", "Microsoft JhengHei", sans-serif;
    }
    * { box-sizing: border-box; }
    html { background: var(--bg); color: var(--ink); }
    body { margin: 0; min-width: 0; overflow-wrap: anywhere; line-height: 1.55; }
    a { color: var(--primary); text-decoration: none; }
    .page { max-width: 760px; margin: 0 auto; padding: 36px 20px 60px; }
    .breadcrumb { color: var(--muted); font-size: 0.9rem; margin-bottom: 12px; }
    .breadcrumb a { color: var(--primary-dark); }
    h1 { font-size: 1.7rem; margin: 0 0 6px; }
    p.lead { color: var(--muted); margin: 0 0 22px; }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-left: 4px solid var(--warning);
      border-radius: 12px;
      padding: 22px;
      box-shadow: var(--shadow);
    }
    .panel .badge {
      display: inline-block;
      background: var(--warning-bg);
      color: var(--warning);
      border-radius: 999px;
      padding: 2px 10px;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .panel h2 { font-size: 1.15rem; margin: 8px 0 4px; }
    .panel p { color: var(--muted); margin: 6px 0; }
    footer { border-top: 1px solid var(--line); background: #eef2fa; color: var(--muted); font-size: 0.85rem; padding: 16px 20px; text-align: center; margin-top: 30px; }
  </style>
</head>
<body>
  <div class="page">
    <div class="breadcrumb"><a href="../">← 返回首頁</a></div>
    <h1>中二甲部練習</h1>
    <p class="lead">題目庫正籌備中。</p>

    <div class="panel">
      <span class="badge">題目庫籌備中</span>
      <h2>暫時冇可練習內容</h2>
      <p>中二題目庫尚未入庫（<code>question-bank.json</code> 入面暫無 <code>grade=s2</code> 嘅題型）。</p>
      <p>如果你有題目或參考材料想加入，可以用「老師選題工具」嘅自訂模式先行測試；正式入庫後會喺度顯示。</p>
      <p>想即刻有嘢做？試下 <a href="../s1/index.html">中一甲部</a> 或 <a href="../s3/index.html">中三甲部</a>，或者 <a href="../hkdse/">HKDSE 練習</a>。</p>
    </div>
  </div>
  <footer>由 ai-lish 維護 · 公開 GitHub Pages</footer>
</body>
</html>
